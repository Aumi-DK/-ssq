<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>双色球 번호 추천기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="frame">
    <h1 id="titleText">双色球 번호 추천기</h1>
    <p class="sub" id="subtitleText">1~33 사이에서 빨간 공 6개, 1~16 사이에서 파란 공 1개를 무작위 추천합니다.</p>

    <div class="controls">
      <button id="generate">추천 번호 생성</button>
      <button id="copy" class="secondary">클립보드로 복사</button>
      <div class="slider">
        <label for="count" id="countLabelText"><span id="countPrefix">세트 개수:</span> <span id="countLabel">3</span><span id="countSuffix">개</span></label>
        <input type="range" id="count" min="1" max="8" value="3">
      </div>
      <label class="toggle">
        <input type="checkbox" id="themeToggle">
        <span class="pill">
          <span class="thumb"></span>
        </span>
        <span class="toggle-label" id="themeLabel">다크 모드</span>
      </label>
      <label class="select">
        <select id="langSelect" aria-label="language">
          <option value="ko">한국어</option>
          <option value="zh">中文</option>
        </select>
      </label>
    </div>

    <div class="checker">
      <div class="group">
        <label id="winRedLabel">당첨 빨간 공 (6개, 쉼표/공백 구분)</label>
        <input type="text" id="winReds" placeholder="예: 3,8,11,22,25,30">
      </div>
      <div class="group short">
        <label id="winBlueLabel">당첨 파란 공 (1개)</label>
        <input type="number" id="winBlue" min="1" max="16" placeholder="1~16">
      </div>
      <button id="check" class="ghost">당첨 확인</button>
    </div>

    <div class="results" id="results"></div>
    <div class="helper" id="helperText">Tip: 버튼을 눌러 새로운 조합을 바로 만들어 보세요.</div>
    <footer id="footerText">참고: 추천 번호는 재미용이며 당첨을 보장하지 않습니다.</footer>
  </div>
  <canvas id="confetti"></canvas>

  <section class="contact">
    <div class="frame contact-card">
      <h2 id="contactTitle">문의하기</h2>
      <p class="sub" id="contactSub">피드백이나 개선 아이디어가 있다면 메시지를 남겨주세요.</p>
      <form id="contactForm" action="https://formspree.io/f/xpqyyzwg" method="POST">
        <div class="grid">
          <label><span id="emailLabelText">이메일 (답변용)</span>
            <input type="email" name="email" id="emailInput" placeholder="you@example.com" required>
          </label>
          <label><span id="nameLabelText">이름 / 별명</span>
            <input type="text" name="name" id="nameInput" placeholder="홍길동">
          </label>
        </div>
        <label><span id="messageLabelText">메시지</span>
          <textarea name="message" id="messageInput" rows="4" placeholder="원하시는 기능이나 버그 제보를 적어주세요." required></textarea>
        </label>
        <div class="contact-actions">
          <button type="submit" class="secondary" id="sendButton">보내기</button>
          <span id="contactStatus" class="contact-status"></span>
        </div>
      </form>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
